<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Target Side -->
  <rect x="20" y="20" width="300" height="300" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="170" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Target Side</text>
  <text x="170" y="72" text-anchor="middle" font-size="12" fill="#2e7d32">KHR_node_lookat_target</text>

  <!-- Target Node box -->
  <rect x="60" y="100" width="220" height="60" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="170" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">🎯 Target Node</text>
  <text x="170" y="145" text-anchor="middle" font-size="11" fill="#666">hint: "eye_target"</text>

  <!-- Position box -->
  <rect x="80" y="210" width="180" height="50" rx="8" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="170" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">World-Space</text>
  <text x="170" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Position</text>

  <!-- Arrow from node to position -->
  <line x1="170" y1="160" x2="170" y2="205" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Constraint Side -->
  <rect x="500" y="20" width="300" height="300" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="650" y="52" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d47a1">Constraint Side</text>
  <text x="650" y="72" text-anchor="middle" font-size="12" fill="#1565c0">Other Systems</text>

  <!-- Eye Tracking box -->
  <rect x="530" y="95" width="240" height="48" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="650" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">👁️ Eye Tracking</text>
  <text x="650" y="133" text-anchor="middle" font-size="11" fill="#666">VRM lookAt</text>

  <!-- Head Aim box -->
  <rect x="530" y="160" width="240" height="48" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="650" y="181" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">🗣️ Head Aim</text>
  <text x="650" y="198" text-anchor="middle" font-size="11" fill="#666">VRMC_node_constraint</text>

  <!-- Camera Controller box -->
  <rect x="530" y="225" width="240" height="48" rx="8" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="650" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">📷 Camera Controller</text>
  <text x="650" y="263" text-anchor="middle" font-size="11" fill="#666">Application Code</text>

  <!-- Arrows from position to constraints -->
  <line x1="260" y1="230" x2="525" y2="119" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <line x1="260" y1="235" x2="525" y2="184" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <line x1="260" y1="240" x2="525" y2="249" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="6,3"/>

  <!-- Arrow labels -->
  <text x="395" y="165" text-anchor="middle" font-size="11" fill="#777">position</text>
  <text x="395" y="225" text-anchor="middle" font-size="11" fill="#777">position</text>
  <text x="395" y="260" text-anchor="middle" font-size="11" fill="#777">position</text>
</svg>
